<!DOCTYPE html>
<html lang="en">
<head>
  <title>MindSim Viewer</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    /* Blueprint.js dark palette tokens */
    :root {
      --bp-dark-gray1: #182026;
      --bp-dark-gray3: #293742;
      --bp-dark-gray5: #394B59;
      --bp-gray1: #5C7080;
      --bp-gray3: #8A9BA8;
      --bp-gray4: #A7B6C2;
      --bp-gray5: #BFCCD6;
      --bp-light-gray1: #CED9E0;
      --bp-light-gray5: #F5F8FA;
      --bp-blue1: #0E5A8A;
      --bp-blue3: #137CBD;
      --bp-blue4: #2B95D6;
      --bp-blue5: #48AFF0;
      --bp-green3: #0F9960;
      --bp-green4: #15B371;
      --bp-red3: #DB3737;
      --bp-red4: #F55656;
      --bp-gold3: #D99E0B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bp-light-gray5); color: var(--bp-dark-gray1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden; position: fixed; width: 100%; height: 100%;
      touch-action: none; user-select: none;
    }
    #canvas-container { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
    canvas { display: block; }

    /* Top bar */
    #top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 44px; background: rgba(255,255,255,0.92);
      display: flex; align-items: center; padding: 0 16px;
      border-bottom: 1px solid var(--bp-light-gray1);
      z-index: 100; backdrop-filter: blur(8px);
    }
    #top-bar h1 { font-size: 14px; font-weight: 600; margin-right: 24px; color: var(--bp-dark-gray1); }
    #top-bar .bot-name {
      font-size: 13px; color: var(--bp-blue1); margin-right: auto;
      cursor: pointer; padding: 4px 8px; border-radius: 4px;
      transition: background 0.1s;
    }
    #top-bar .bot-name:hover { background: rgba(19,124,189,0.1); }

    /* Mode tabs */
    .mode-tabs { display: flex; gap: 2px; }
    .mode-tab {
      padding: 6px 16px; border-radius: 6px 6px 0 0;
      background: rgba(206,217,224,0.4); border: none; color: var(--bp-gray1);
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: all 0.15s;
    }
    .mode-tab:hover { background: rgba(206,217,224,0.7); color: var(--bp-dark-gray5); }
    .mode-tab.active { background: rgba(19,124,189,0.15); color: var(--bp-blue1); }

    /* Tree panel (left) */
    #tree-panel {
      position: absolute; top: 44px; left: 0; bottom: 0; width: 280px;
      background: rgba(255,255,255,0.94); border-right: 1px solid var(--bp-light-gray1);
      z-index: 90; overflow-y: auto; padding: 12px;
      backdrop-filter: blur(8px); display: none;
    }
    #tree-panel h2 {
      font-size: 11px; font-weight: 600; color: var(--bp-blue1);
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* Tree node styles */
    .tree-node { }
    .tree-node-header {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 4px; border-radius: 4px; cursor: pointer;
      font-size: 12px; color: var(--bp-dark-gray5);
      transition: background 0.1s;
    }
    .tree-node-header:hover { background: rgba(206,217,224,0.5); }
    .tree-node.focused > .tree-node-header {
      background: rgba(19,124,189,0.15); color: var(--bp-blue1);
    }
    .tree-chevron {
      width: 14px; text-align: center; font-size: 8px; color: var(--bp-gray3);
      flex-shrink: 0; cursor: pointer;
    }
    .tree-chevron:hover { color: var(--bp-gray1); }
    .tree-node-icon { font-size: 10px; flex-shrink: 0; }
    .tree-node-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-node-children { padding-left: 14px; }

    /* Side panel (right) */
    #side-panel {
      position: absolute; top: 44px; right: 0; bottom: 0; width: 320px;
      background: rgba(255,255,255,0.94); border-left: 1px solid var(--bp-light-gray1);
      z-index: 90; overflow-y: auto; padding: 16px;
      backdrop-filter: blur(8px);
    }
    #side-panel h2 { font-size: 13px; font-weight: 600; color: var(--bp-blue1); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    #side-panel h3 { font-size: 12px; font-weight: 600; color: var(--bp-gray1); margin: 12px 0 6px; }

    /* Property grid */
    .prop-grid { margin-bottom: 8px; }
    .prop-row {
      display: flex; justify-content: space-between; font-size: 12px;
      padding: 3px 0; border-bottom: 1px solid rgba(206,217,224,0.4);
    }
    .prop-label { color: var(--bp-gray1); }
    .prop-value { color: var(--bp-dark-gray5); font-family: monospace; font-size: 11px; }

    /* Property badges */
    .prop-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 3px; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .body-badge { background: rgba(19,124,189,0.12); color: var(--bp-blue1); }
    .joint-badge { background: rgba(15,153,96,0.12); color: #0A6640; }
    .camera-badge { background: rgba(113,87,217,0.12); color: #7157D9; }
    .battery-badge { background: rgba(217,158,11,0.12); color: #BF8C0A; }
    .wheel-badge { background: rgba(0,179,164,0.12); color: #008075; }
    .component-badge { background: rgba(92,112,128,0.12); color: var(--bp-gray1); }
    .servo-badge { background: rgba(15,153,96,0.12); color: #0A6640; }

    /* Property chips (clickable links to other nodes) */
    .prop-chip {
      display: inline-block; font-size: 11px; padding: 4px 10px;
      border-radius: 4px; margin: 2px 4px 2px 0;
      background: rgba(206,217,224,0.3); border: 1px solid var(--bp-light-gray1);
      transition: all 0.15s;
    }
    .prop-chip:hover { background: rgba(206,217,224,0.6); border-color: var(--bp-gray5); }
    .body-chip { color: var(--bp-blue1); }
    .joint-chip { color: #0A6640; }
    .camera-chip { color: #7157D9; }
    .battery-chip { color: #BF8C0A; }
    .wheel-chip { color: #008075; }
    .component-chip { color: var(--bp-gray1); }

    /* Controls */
    .slider-group { margin-bottom: 8px; }
    .slider-label {
      display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px;
    }
    .slider-label .name { color: var(--bp-dark-gray5); }
    .slider-label .value { color: var(--bp-blue3); font-family: monospace; }
    input[type="range"] {
      width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
      background: var(--bp-light-gray1); border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--bp-blue3); cursor: pointer;
    }
    .btn {
      padding: 6px 14px; border-radius: 4px; border: 1px solid var(--bp-light-gray1);
      background: rgba(206,217,224,0.3); color: var(--bp-dark-gray5); cursor: pointer;
      font-size: 12px; transition: all 0.15s;
    }
    .btn:hover { background: rgba(206,217,224,0.6); color: var(--bp-dark-gray1); }
    .btn.active { background: rgba(19,124,189,0.15); border-color: var(--bp-blue3); color: var(--bp-blue1); }

    /* Assembly step info */
    .step-info {
      background: rgba(206,217,224,0.3); border-radius: 6px;
      padding: 10px; margin-bottom: 8px;
    }
    .step-info .step-title { font-size: 13px; font-weight: 600; color: var(--bp-dark-gray1); }
    .step-info .step-desc { font-size: 12px; color: var(--bp-gray1); margin-top: 4px; }

    /* IK info */
    .ik-info { font-size: 12px; color: var(--bp-gray1); line-height: 1.6; }
    .ik-info .highlight { color: var(--bp-green3); }
    .ik-info .anchor { color: var(--bp-blue3); }
    .ik-info .target { color: var(--bp-red3); }

    /* Loading overlay */
    #loading {
      position: absolute; inset: 0; background: var(--bp-light-gray5);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 3px solid var(--bp-light-gray1);
      border-top-color: var(--bp-blue3); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading p { margin-top: 16px; font-size: 14px; color: var(--bp-gray1); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Joint axis colors */
    .joint-color { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

    /* ── Landing page ── */
    #landing {
      position: absolute; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1a1a2e;
    }
    #landing h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    #landing p { font-size: 14px; color: #888; margin-bottom: 40px; }
    .landing-cards { display: flex; gap: 24px; }
    .landing-card {
      width: 220px; padding: 32px 24px; border-radius: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      text-align: center; cursor: pointer; transition: all 0.2s;
      text-decoration: none; color: inherit;
    }
    .landing-card:hover { background: rgba(80,80,200,0.15); border-color: #6666cc; transform: translateY(-2px); }
    .landing-card .card-icon { font-size: 36px; margin-bottom: 12px; }
    .landing-card .card-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .landing-card .card-desc { font-size: 12px; color: #888; }

    /* ── Component browser ── */
    #component-browser { display: none; position: absolute; inset: 0; z-index: 50; pointer-events: none; }
    #component-sidebar {
      position: absolute; top: 44px; left: 0; bottom: 0; width: 220px;
      background: rgba(255,255,255,0.94); border-right: 1px solid var(--bp-light-gray1);
      z-index: 91; overflow-y: auto; padding: 12px 0;
      backdrop-filter: blur(8px); pointer-events: auto;
    }
    #component-sidebar .sidebar-title {
      font-size: 11px; font-weight: 600; color: var(--bp-blue1); text-transform: uppercase;
      letter-spacing: 0.5px; padding: 8px 16px 4px;
    }
    .component-item {
      display: block; padding: 8px 16px; cursor: pointer; font-size: 13px;
      font-family: inherit; color: var(--bp-dark-gray5); transition: all 0.1s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .component-item:hover { background: rgba(206,217,224,0.5); color: var(--bp-dark-gray1); }
    .component-item.active { background: rgba(19,124,189,0.15); color: var(--bp-blue1); }
    .component-item .item-category {
      font-size: 10px; color: var(--bp-gray3); text-transform: uppercase; display: block;
    }

    /* Layer checkboxes */
    .layer-controls { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; }
    .layer-toggle {
      display: flex; align-items: center; gap: 8px; padding: 5px 0;
      cursor: pointer; font-size: 12px; color: var(--bp-dark-gray5);
    }
    .layer-toggle input[type="checkbox"] {
      width: 14px; height: 14px; accent-color: var(--bp-blue3); cursor: pointer;
    }
    .layer-swatch {
      display: inline-block; width: 10px; height: 10px; border-radius: 2px;
      border: 1px solid var(--bp-light-gray1); flex-shrink: 0;
    }
    .layer-label { flex: 1; }

    /* Hoverable mounting point / wire port items */
    .highlight-item {
      padding: 2px 4px; border-radius: 3px; cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .highlight-item:hover { background: rgba(206,217,224,0.5); color: var(--bp-dark-gray1); }

    /* View toolbar (floating above canvas in component browser) */
    #view-toolbar {
      display: none; position: absolute; top: 52px; z-index: 85;
      left: 228px;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
      border: 1px solid var(--bp-light-gray1); border-radius: 6px;
      padding: 4px; gap: 2px;
      align-items: center; pointer-events: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    #view-toolbar button {
      background: none; border: none; cursor: pointer;
      font-size: 11px; font-weight: 500; font-family: inherit;
      padding: 5px 10px; border-radius: 4px;
      color: var(--bp-gray1); transition: all 0.1s;
    }
    #view-toolbar button:hover { background: rgba(206,217,224,0.5); color: var(--bp-dark-gray1); }
    #view-toolbar button.active { background: var(--bp-blue3); color: #fff; }
    .toolbar-sep { width: 1px; height: 20px; background: var(--bp-light-gray1); flex-shrink: 0; }
    .axis-btn { min-width: 24px; font-weight: 600; font-size: 10px; }
    #section-slider { accent-color: var(--bp-blue3); cursor: pointer; }

    /* ── Quick Switcher (Ctrl+K) ── */
    #quick-switcher-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
    }
    #quick-switcher {
      position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
      width: 480px; max-height: 60vh; background: #fff;
      border-radius: 10px; box-shadow: 0 16px 48px rgba(0,0,0,0.25);
      overflow: hidden; display: flex; flex-direction: column;
    }
    #qs-input {
      width: 100%; padding: 14px 18px; border: none; outline: none;
      font-size: 15px; font-family: inherit; color: var(--bp-dark-gray1);
      border-bottom: 1px solid var(--bp-light-gray1);
      background: transparent;
    }
    #qs-input::placeholder { color: var(--bp-gray3); }
    #qs-results {
      overflow-y: auto; max-height: calc(60vh - 50px); padding: 6px 0;
    }
    .qs-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 18px; cursor: pointer; transition: background 0.08s;
    }
    .qs-item:hover, .qs-item.qs-active { background: rgba(19,124,189,0.1); }
    .qs-item-name { font-size: 14px; color: var(--bp-dark-gray1); }
    .qs-item-category {
      font-size: 11px; color: var(--bp-gray1); text-transform: uppercase;
      margin-left: auto;
    }
    .qs-empty {
      padding: 16px 18px; font-size: 13px; color: var(--bp-gray3); text-align: center;
    }
  </style>
</head>
<body>
  <!-- Landing page -->
  <div id="landing">
    <h1>MindSim</h1>
    <p>Design robots from real components</p>
    <div class="landing-cards">
      <a class="landing-card" href="?bot=wheeler_arm">
        <div class="card-icon">&#x1F916;</div>
        <div class="card-title">Bots</div>
        <div class="card-desc">MuJoCo simulation viewer with joint, assembly, and IK modes</div>
      </a>
      <a class="landing-card" href="?component=catalog">
        <div class="card-icon">&#x1F9F0;</div>
        <div class="card-title">Components</div>
        <div class="card-desc">Browse servos, sensors, and boards with 3D geometry preview</div>
      </a>
    </div>
  </div>

  <!-- Loading overlay (bot viewer) -->
  <div id="loading" style="display:none">
    <div class="spinner"></div>
    <p id="loading-text">Loading MuJoCo WASM...</p>
  </div>

  <div id="canvas-container"></div>

  <!-- Top bar (shared by bot viewer and component browser) -->
  <div id="top-bar" style="display:none">
    <h1>MindSim</h1>
    <span class="bot-name" id="bot-name"></span>
    <div class="mode-tabs" id="mode-tabs">
      <button class="mode-tab active" data-mode="explore">Explore</button>
      <button class="mode-tab" data-mode="joint">Joints</button>
      <button class="mode-tab" data-mode="assembly">Assembly</button>
      <button class="mode-tab" data-mode="ik">IK</button>
    </div>
  </div>

  <div id="tree-panel">
    <h2>Components</h2>
    <div id="tree-content"></div>
  </div>

  <div id="side-panel" style="display:none">
    <!-- Populated by mode JS -->
  </div>

  <!-- Component browser layout -->
  <div id="component-browser">
    <div id="component-sidebar"></div>
    <div id="view-toolbar">
      <button data-view="front">Front</button>
      <button data-view="side">Side</button>
      <button data-view="top">Top</button>
      <button data-view="iso" class="active">Iso</button>
      <span class="toolbar-sep"></span>
      <button id="measure-toggle" title="Measure distance (click two points)">Measure</button>
      <button id="measure-clear" title="Clear all measurements">Clear</button>
      <span class="toolbar-sep"></span>
      <button id="render-svg" title="Export high-quality 2D SVG">Render SVG</button>
      <span class="toolbar-sep"></span>
      <button id="section-toggle" title="Toggle section cut plane">Section</button>
      <span id="section-controls" style="display:none; align-items:center; gap:4px">
        <button data-section-axis="x" class="axis-btn">X</button>
        <button data-section-axis="y" class="axis-btn">Y</button>
        <button data-section-axis="z" class="axis-btn active">Z</button>
        <input id="section-slider" type="range" min="0" max="100" value="50" style="width:100px">
        <button id="section-flip" title="Flip cut direction" class="axis-btn">&#8645;</button>
      </span>
    </div>
  </div>

  <!-- Quick Switcher -->
  <div id="quick-switcher-overlay" style="display:none">
    <div id="quick-switcher">
      <input id="qs-input" type="text" placeholder="Search bots and components..." autocomplete="off" spellcheck="false">
      <div id="qs-results"></div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="viewer.js"></script>
  <script type="module" src="quick-switcher.js"></script>
</body>
</html>
