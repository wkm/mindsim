<!DOCTYPE html>
<html lang="en">
<head>
  <title>MindSim Viewer</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@blueprintjs/icons@5/lib/css/blueprint-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@blueprintjs/core@5/lib/css/blueprint.css">
  <style>
    /* ── App-level overrides ── */
    body {
      overflow: hidden; position: fixed; width: 100%; height: 100%;
      touch-action: none; user-select: none;
      background: var(--bp-light-gray5, #F5F8FA);
    }
    #canvas-container { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
    canvas { display: block; }

    /* ── Navbar ── */
    #top-bar.bp5-navbar {
      position: absolute; z-index: 100;
      backdrop-filter: blur(8px); background: rgba(255,255,255,0.92);
    }
    #bot-name { cursor: pointer; }

    /* ── Tree panel (left) ── */
    #tree-panel {
      position: absolute; top: 50px; left: 0; bottom: 0; width: 280px;
      background: rgba(255,255,255,0.94); border-right: 1px solid #ced9e0;
      z-index: 90; overflow-y: auto; padding: 12px;
      backdrop-filter: blur(8px); display: none;
    }

    /* Tree node styles */
    .tree-node { }
    .tree-node-header {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 4px; border-radius: 4px; cursor: pointer;
      font-size: 12px; color: #394b59;
      transition: background 0.1s;
    }
    .tree-node-header:hover { background: rgba(206,217,224,0.5); }
    .tree-node.focused > .tree-node-header {
      background: rgba(19,124,189,0.15); color: #0e5a8a;
    }
    .tree-chevron {
      width: 14px; text-align: center; font-size: 8px; color: #8a9ba8;
      flex-shrink: 0; cursor: pointer;
    }
    .tree-chevron:hover { color: #5c7080; }
    .tree-node-icon { font-size: 10px; flex-shrink: 0; }
    .tree-node-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-node-children { padding-left: 14px; }

    /* ── Side panel (right) ── */
    #side-panel {
      position: absolute; top: 50px; right: 0; bottom: 0; width: 320px;
      background: rgba(255,255,255,0.94); border-left: 1px solid #ced9e0;
      z-index: 90; overflow-y: auto; padding: 16px;
      backdrop-filter: blur(8px);
    }
    #side-panel h2 { font-size: 13px; font-weight: 600; color: #0e5a8a; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    #side-panel h3 { font-size: 12px; font-weight: 600; color: #5c7080; margin: 12px 0 6px; }

    /* ── Property grid ── */
    .prop-grid { margin-bottom: 8px; }
    .prop-row {
      display: flex; justify-content: space-between; font-size: 12px;
      padding: 3px 0; border-bottom: 1px solid rgba(206,217,224,0.4);
    }
    .prop-label { color: #5c7080; }
    .prop-value { color: #394b59; font-family: monospace; font-size: 11px; }

    /* Property badges */
    .prop-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 3px; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .body-badge { background: rgba(19,124,189,0.12); color: #0e5a8a; }
    .joint-badge { background: rgba(15,153,96,0.12); color: #0a6640; }
    .camera-badge { background: rgba(113,87,217,0.12); color: #7157d9; }
    .battery-badge { background: rgba(217,158,11,0.12); color: #bf8c0a; }
    .wheel-badge { background: rgba(0,179,164,0.12); color: #008075; }
    .component-badge { background: rgba(92,112,128,0.12); color: #5c7080; }
    .servo-badge { background: rgba(15,153,96,0.12); color: #0a6640; }

    /* Property chips (clickable links to other nodes) */
    .prop-chip {
      display: inline-block; font-size: 11px; padding: 4px 10px;
      border-radius: 4px; margin: 2px 4px 2px 0;
      background: rgba(206,217,224,0.3); border: 1px solid #ced9e0;
      transition: all 0.15s;
    }
    .prop-chip:hover { background: rgba(206,217,224,0.6); border-color: #bfccd6; }
    .body-chip { color: #0e5a8a; }
    .joint-chip { color: #0a6640; }
    .camera-chip { color: #7157d9; }
    .battery-chip { color: #bf8c0a; }
    .wheel-chip { color: #008075; }
    .component-chip { color: #5c7080; }

    /* ── Controls ── */
    .slider-group { margin-bottom: 8px; }
    .slider-label {
      display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px;
    }
    .slider-label .name { color: #394b59; }
    .slider-label .value { color: #137cbd; font-family: monospace; }
    input[type="range"] {
      width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
      background: #ced9e0; border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #137cbd; cursor: pointer;
    }

    /* Assembly step info */
    .step-info {
      background: rgba(206,217,224,0.3); border-radius: 6px;
      padding: 10px; margin-bottom: 8px;
    }
    .step-info .step-title { font-size: 13px; font-weight: 600; color: #182026; }
    .step-info .step-desc { font-size: 12px; color: #5c7080; margin-top: 4px; }

    /* IK info */
    .ik-info { font-size: 12px; color: #5c7080; line-height: 1.6; }
    .ik-info .highlight { color: #0f9960; }
    .ik-info .anchor { color: #137cbd; }
    .ik-info .target { color: #db3737; }

    /* ── Loading overlay ── */
    #loading {
      position: absolute; inset: 0; background: #f5f8fa;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #loading p { margin-top: 16px; font-size: 14px; color: #5c7080; }

    /* Joint axis colors */
    .joint-color { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

    /* ── Landing page ── */
    #landing {
      position: absolute; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1a1a2e;
    }
    #landing h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    #landing p { font-size: 14px; color: #888; margin-bottom: 40px; }
    .landing-cards { display: flex; gap: 24px; }
    .landing-card {
      width: 220px; padding: 32px 24px; border-radius: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      text-align: center; cursor: pointer; transition: all 0.2s;
      text-decoration: none; color: inherit;
    }
    .landing-card:hover { background: rgba(80,80,200,0.15); border-color: #6666cc; transform: translateY(-2px); }
    .landing-card .card-icon { font-size: 36px; margin-bottom: 12px; }
    .landing-card .card-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .landing-card .card-desc { font-size: 12px; color: #888; }

    /* ── Component browser ── */
    #component-browser { display: none; position: absolute; inset: 0; z-index: 50; pointer-events: none; }

    /* View dropdown */
    #view-dropdown { box-shadow: 0 2px 8px rgba(0,0,0,0.15); border-radius: 4px; }

    /* Layer checkboxes */
    .layer-controls { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; }
    .layer-toggle {
      display: flex; align-items: center; gap: 8px; padding: 5px 0;
      cursor: pointer; font-size: 12px; color: #394b59;
    }
    .layer-toggle input[type="checkbox"] {
      width: 14px; height: 14px; accent-color: #137cbd; cursor: pointer;
    }
    .layer-swatch {
      display: inline-block; width: 10px; height: 10px; border-radius: 2px;
      border: 1px solid #ced9e0; flex-shrink: 0;
    }
    .layer-label { flex: 1; }

    /* Hoverable mounting point / wire port items */
    .highlight-item {
      padding: 2px 4px; border-radius: 3px; cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .highlight-item:hover { background: rgba(206,217,224,0.5); color: #182026; }

    #section-slider { accent-color: #137cbd; cursor: pointer; }

    /* ── SVG render modal ── */
    #svg-modal { position: fixed; inset: 0; z-index: 3000; }
    #svg-modal .bp5-overlay-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    #svg-modal .bp5-dialog { width: 90vw; height: 85vh; display: flex; flex-direction: column; }
    #svg-modal .bp5-dialog-body {
      flex: 1; overflow: hidden; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    #svg-modal .bp5-dialog-body svg { width: 100%; height: 100%; }

    /* ── Quick Switcher (Ctrl+K) ── */
    #quick-switcher-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
    }
    #quick-switcher {
      position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
      width: 480px; max-height: 60vh;
      overflow: hidden; display: flex; flex-direction: column;
    }
    #qs-input {
      width: 100%; padding: 14px 18px; border: none; outline: none;
      font-size: 15px; font-family: inherit; color: #182026;
      border-bottom: 1px solid #ced9e0;
      background: transparent;
    }
    #qs-input::placeholder { color: #8a9ba8; }
    #qs-results { overflow-y: auto; max-height: calc(60vh - 50px); }
  </style>
</head>
<body>
  <!-- Landing page -->
  <div id="landing">
    <h1>MindSim</h1>
    <p>Design robots from real components</p>
    <div class="landing-cards">
      <a class="landing-card" href="?bot=wheeler_arm">
        <div class="card-icon">&#x1F916;</div>
        <div class="card-title">Bots</div>
        <div class="card-desc">MuJoCo simulation viewer with joint, assembly, and IK modes</div>
      </a>
      <a class="landing-card" href="?component=catalog">
        <div class="card-icon">&#x1F9F0;</div>
        <div class="card-title">Components</div>
        <div class="card-desc">Browse servos, sensors, and boards with 3D geometry preview</div>
      </a>
    </div>
  </div>

  <!-- Loading overlay (bot viewer) -->
  <div id="loading" style="display:none">
    <div class="bp5-spinner">
      <div class="bp5-spinner-animation">
        <svg width="50" viewBox="0 0 100 100">
          <path class="bp5-spinner-track" d="M 50,50 m 0,-45 a 45,45 0 1 1 0,90 a 45,45 0 1 1 0,-90"></path>
          <path class="bp5-spinner-head" d="M 50,50 m 0,-45 a 45,45 0 1 1 0,90 a 45,45 0 1 1 0,-90" pathLength="280" stroke-dasharray="280 280" stroke-dashoffset="210"></path>
        </svg>
      </div>
    </div>
    <p id="loading-text">Loading MuJoCo WASM...</p>
  </div>

  <div id="canvas-container"></div>

  <!-- Top bar (shared by bot viewer and component browser) -->
  <nav id="top-bar" class="bp5-navbar" style="display:none">
    <div class="bp5-navbar-group bp5-align-left">
      <span class="bp5-navbar-heading">MindSim</span>
      <span class="bp5-navbar-divider"></span>
      <button class="bp5-button bp5-minimal" id="bot-name"></button>
      <!-- Component browser: View dropdown + tools -->
      <span class="bp5-navbar-divider" id="cb-nav-divider" style="display:none"></span>
      <div class="bp5-button-group" id="cb-view-group" style="display:none">
        <div class="bp5-popover2-target" style="position:relative">
          <button class="bp5-button bp5-minimal bp5-small" id="view-dropdown-btn">
            <span class="bp5-icon bp5-icon-eye-open"></span> View <span class="bp5-icon bp5-icon-caret-down" style="margin-left:2px"></span>
          </button>
          <ul class="bp5-menu bp5-elevation-2" id="view-dropdown" style="display:none; position:absolute; top:100%; left:0; z-index:200; min-width:160px">
            <!-- Populated by JS -->
          </ul>
        </div>
      </div>
      <div class="bp5-button-group" id="cb-tools-group" style="display:none">
        <button class="bp5-button bp5-minimal bp5-small" id="measure-toggle" title="Measure distance (M)">
          <span class="bp5-icon bp5-icon-measurement"></span> Measure
        </button>
        <button class="bp5-button bp5-minimal bp5-small" id="measure-clear" title="Clear measurements">Clear</button>
        <span class="bp5-navbar-divider"></span>
        <button class="bp5-button bp5-minimal bp5-small" id="section-toggle" title="Section cut (S)">
          <span class="bp5-icon bp5-icon-cut"></span> Section
        </button>
        <span id="section-controls" style="display:none; align-items:center; gap:2px">
          <button class="bp5-button bp5-small bp5-minimal" data-section-axis="x">X</button>
          <button class="bp5-button bp5-small bp5-minimal" data-section-axis="y">Y</button>
          <button class="bp5-button bp5-small bp5-active" data-section-axis="z">Z</button>
          <input id="section-slider" type="range" min="0" max="100" value="50" style="width:80px">
          <button class="bp5-button bp5-small bp5-minimal" id="section-flip" title="Flip">&#8645;</button>
        </span>
        <span class="bp5-navbar-divider"></span>
        <button class="bp5-button bp5-minimal bp5-small bp5-intent-primary" id="render-svg" title="Render SVG">
          <span class="bp5-icon bp5-icon-export"></span> Render SVG
        </button>
      </div>
    </div>
    <div class="bp5-navbar-group bp5-align-right" id="mode-tabs">
      <button class="bp5-button bp5-minimal bp5-active" data-mode="explore">Explore</button>
      <button class="bp5-button bp5-minimal" data-mode="joint">Joints</button>
      <button class="bp5-button bp5-minimal" data-mode="assembly">Assembly</button>
      <button class="bp5-button bp5-minimal" data-mode="ik">IK</button>
    </div>
  </nav>

  <div id="tree-panel">
    <h2 class="bp5-heading">Components</h2>
    <div id="tree-content"></div>
  </div>

  <div id="side-panel" style="display:none">
    <!-- Populated by mode JS -->
  </div>

  <!-- Component browser layout -->
  <div id="component-browser">
    <svg id="axis-gizmo" width="100" height="100" style="display:none; position:absolute; top:56px; right:332px; z-index:85; pointer-events:none; overflow:visible"></svg>
  </div>

  <!-- SVG Render Modal -->
  <div id="svg-modal" style="display:none">
    <div class="bp5-overlay-backdrop"></div>
    <div class="bp5-dialog">
      <div class="bp5-dialog-header">
        <h5 class="bp5-heading" id="svg-modal-title"></h5>
        <button class="bp5-button bp5-minimal" id="svg-modal-download" title="Download SVG">
          <span class="bp5-icon bp5-icon-download"></span> Download
        </button>
        <button class="bp5-dialog-close-button bp5-button bp5-minimal bp5-icon-cross" id="svg-modal-close"></button>
      </div>
      <div class="bp5-dialog-body" id="svg-modal-body"></div>
    </div>
  </div>

  <!-- Quick Switcher -->
  <div id="quick-switcher-overlay" style="display:none">
    <div id="quick-switcher" class="bp5-card bp5-elevation-4">
      <input id="qs-input" class="bp5-input bp5-large bp5-fill" type="text" placeholder="Search bots and components..." autocomplete="off" spellcheck="false">
      <div id="qs-results" class="bp5-menu"></div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="viewer.js"></script>
  <script type="module" src="quick-switcher.js"></script>
</body>
</html>
