<!DOCTYPE html>
<html lang="en">
<head>
  <title>MindSim Viewer</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden; position: fixed; width: 100%; height: 100%;
      touch-action: none; user-select: none;
    }
    #canvas-container { position: absolute; inset: 0; z-index: 1; }
    canvas { display: block; }

    /* Top bar */
    #top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 44px; background: rgba(10,10,30,0.85);
      display: flex; align-items: center; padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 100; backdrop-filter: blur(8px);
    }
    #top-bar h1 { font-size: 14px; font-weight: 600; margin-right: 24px; color: #fff; }
    #top-bar .bot-name { font-size: 13px; color: #8888cc; margin-right: auto; }

    /* Mode tabs */
    .mode-tabs { display: flex; gap: 2px; }
    .mode-tab {
      padding: 6px 16px; border-radius: 6px 6px 0 0;
      background: rgba(255,255,255,0.05); border: none; color: #999;
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: all 0.15s;
    }
    .mode-tab:hover { background: rgba(255,255,255,0.1); color: #ccc; }
    .mode-tab.active { background: rgba(80,80,200,0.3); color: #fff; }

    /* Side panel */
    #side-panel {
      position: absolute; top: 44px; right: 0; bottom: 0; width: 320px;
      background: rgba(10,10,30,0.9); border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 90; overflow-y: auto; padding: 16px;
      backdrop-filter: blur(8px);
    }
    #side-panel h2 { font-size: 13px; font-weight: 600; color: #8888cc; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    #side-panel h3 { font-size: 12px; font-weight: 600; color: #aaa; margin: 12px 0 6px; }

    /* Controls */
    .slider-group { margin-bottom: 8px; }
    .slider-label {
      display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px;
    }
    .slider-label .name { color: #ccc; }
    .slider-label .value { color: #8888cc; font-family: monospace; }
    input[type="range"] {
      width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #6666cc; cursor: pointer;
    }
    .btn {
      padding: 6px 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer;
      font-size: 12px; transition: all 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .btn.active { background: rgba(80,80,200,0.3); border-color: #6666cc; color: #fff; }

    /* Assembly step info */
    .step-info {
      background: rgba(255,255,255,0.05); border-radius: 6px;
      padding: 10px; margin-bottom: 8px;
    }
    .step-info .step-title { font-size: 13px; font-weight: 600; color: #fff; }
    .step-info .step-desc { font-size: 12px; color: #999; margin-top: 4px; }

    /* IK info */
    .ik-info { font-size: 12px; color: #999; line-height: 1.6; }
    .ik-info .highlight { color: #6c6; }
    .ik-info .anchor { color: #66ccff; }
    .ik-info .target { color: #ff6666; }

    /* Loading overlay */
    #loading {
      position: absolute; inset: 0; background: #1a1a2e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6666cc; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading p { margin-top: 16px; font-size: 14px; color: #888; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Joint axis colors */
    .joint-color { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

    /* ── Landing page ── */
    #landing {
      position: absolute; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1a1a2e;
    }
    #landing h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    #landing p { font-size: 14px; color: #888; margin-bottom: 40px; }
    .landing-cards { display: flex; gap: 24px; }
    .landing-card {
      width: 220px; padding: 32px 24px; border-radius: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      text-align: center; cursor: pointer; transition: all 0.2s;
      text-decoration: none; color: inherit;
    }
    .landing-card:hover { background: rgba(80,80,200,0.15); border-color: #6666cc; transform: translateY(-2px); }
    .landing-card .card-icon { font-size: 36px; margin-bottom: 12px; }
    .landing-card .card-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .landing-card .card-desc { font-size: 12px; color: #888; }

    /* ── Component browser ── */
    #component-browser { display: none; position: absolute; inset: 0; z-index: 50; pointer-events: none; }
    #component-sidebar {
      position: absolute; top: 44px; left: 0; bottom: 0; width: 220px;
      background: rgba(10,10,30,0.9); border-right: 1px solid rgba(255,255,255,0.1);
      z-index: 91; overflow-y: auto; padding: 12px 0;
      backdrop-filter: blur(8px); pointer-events: auto;
    }
    #component-sidebar .sidebar-title {
      font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 8px 16px 4px;
    }
    .component-item {
      display: block; padding: 8px 16px; cursor: pointer; font-size: 13px;
      font-family: inherit; color: #999; transition: all 0.1s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .component-item:hover { background: rgba(255,255,255,0.05); color: #ccc; }
    .component-item.active { background: rgba(80,80,200,0.2); color: #fff; }
    .component-item .item-category {
      font-size: 10px; color: #555; text-transform: uppercase; display: block;
    }

    /* Layer checkboxes */
    .layer-controls { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; }
    .layer-toggle {
      display: flex; align-items: center; gap: 8px; padding: 5px 0;
      cursor: pointer; font-size: 12px; color: #ccc;
    }
    .layer-toggle input[type="checkbox"] {
      width: 14px; height: 14px; accent-color: #6666cc; cursor: pointer;
    }
    .layer-swatch {
      display: inline-block; width: 10px; height: 10px; border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0;
    }
    .layer-label { flex: 1; }

    /* Hoverable mounting point / wire port items */
    .highlight-item {
      padding: 2px 4px; border-radius: 3px; cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .highlight-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  </style>
</head>
<body>
  <!-- Landing page -->
  <div id="landing">
    <h1>MindSim</h1>
    <p>Design robots from real components</p>
    <div class="landing-cards">
      <a class="landing-card" href="?bot=wheeler_arm">
        <div class="card-icon">&#x1F916;</div>
        <div class="card-title">Bots</div>
        <div class="card-desc">MuJoCo simulation viewer with joint, assembly, and IK modes</div>
      </a>
      <a class="landing-card" href="?component=catalog">
        <div class="card-icon">&#x1F9F0;</div>
        <div class="card-title">Components</div>
        <div class="card-desc">Browse servos, sensors, and boards with 3D geometry preview</div>
      </a>
    </div>
  </div>

  <!-- Loading overlay (bot viewer) -->
  <div id="loading" style="display:none">
    <div class="spinner"></div>
    <p id="loading-text">Loading MuJoCo WASM...</p>
  </div>

  <div id="canvas-container"></div>

  <!-- Top bar (shared by bot viewer and component browser) -->
  <div id="top-bar" style="display:none">
    <h1>MindSim</h1>
    <span class="bot-name" id="bot-name"></span>
    <div class="mode-tabs" id="mode-tabs">
      <button class="mode-tab active" data-mode="joint">Joints</button>
      <button class="mode-tab" data-mode="assembly">Assembly</button>
      <button class="mode-tab" data-mode="ik">IK</button>
    </div>
  </div>

  <div id="side-panel" style="display:none">
    <!-- Populated by mode JS -->
  </div>

  <!-- Component browser layout -->
  <div id="component-browser">
    <div id="component-sidebar"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="viewer.js"></script>
</body>
</html>
